<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Reply Assistant Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <h1>X Reply Assistant</h1>
      <p class="subtitle">
        Configure your LLM provider. Posting uses the native X UI (no developer
        credentials required).
      </p>

      <section>
        <h2>LLM Provider</h2>
        <div class="field">
          <label for="llmProvider">Provider</label>
          <select id="llmProvider">
            <option value="openai">OpenAI-compatible</option>
            <option value="nvidia">NVIDIA NIM</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google Gemini</option>
            <option value="custom">Custom OpenAI-compatible</option>
          </select>
        </div>
        <div class="field">
          <label for="llmApiKey">API Key</label>
          <input id="llmApiKey" type="password" />
        </div>
        <div class="field">
          <label for="llmBaseUrl">Base URL (optional)</label>
          <input id="llmBaseUrl" type="text" />
        </div>
        <div class="field">
          <label for="llmModel">Model</label>
          <input id="llmModel" type="text" />
        </div>
        <div class="field">
          <label for="llmTemperature">Temperature</label>
          <input id="llmTemperature" type="number" step="0.1" min="0" max="2" />
        </div>
        <div class="field">
          <label for="llmMaxTokens">Max Tokens</label>
          <input id="llmMaxTokens" type="number" min="50" max="2000" />
        </div>
        <div class="row">
          <button id="llmTest">Test LLM</button>
        </div>
      </section>

      <section>
        <h2>Behavior Guardrails</h2>
        <div class="field">
          <label for="tone">Tone</label>
          <input id="tone" type="text" />
        </div>
        <div class="field">
          <label for="maxPostsPerHour">Max Posts per Hour</label>
          <input id="maxPostsPerHour" type="number" min="1" max="60" />
        </div>
        <div class="field">
          <label for="cooldownSeconds">Cooldown Seconds</label>
          <input id="cooldownSeconds" type="number" min="0" max="3600" />
        </div>
        <div class="field">
          <label for="duplicateWindowMinutes">Duplicate Window (minutes)</label>
          <input id="duplicateWindowMinutes" type="number" min="0" max="1440" />
        </div>
        <div class="field checkbox">
          <input id="requireConfirmBeforePost" type="checkbox" />
          <label for="requireConfirmBeforePost">Require confirmation before posting</label>
        </div>
      </section>

      <div class="row">
        <button id="save">Save Settings</button>
        <button id="reset">Reset to Defaults</button>
      </div>
      <div id="status" class="status"></div>
      <p class="fineprint">
        This extension is designed to comply with X policies. It does not bypass platform rules.
      </p>
    </div>

    <script src="options.js"></script>
  </body>
</html>
